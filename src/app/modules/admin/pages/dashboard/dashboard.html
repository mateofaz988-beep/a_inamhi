<div class="dashboard-container">

  <!-- HEADER -->
  <header class="dashboard-header">

    <!-- IZQUIERDA -->
    <div class="header-left">
      <h1 class="title">Panel de Control</h1>
      <p class="subtitle">Bienvenido al sistema INAMHI</p>
    </div>

    <!-- DERECHA -->
    <div class="header-actions">

      <!-- NUEVO FUNCIONARIO -->
      <button
        class="btn-nuevo"
        routerLink="/admin/nuevo-funcionario">
        <i class="bi bi-person-plus-fill me-2"></i>
        Nuevo Funcionario
      </button>

      <!-- AUDITORIA -->
      <button
        class="btn-auditoria"
        routerLink="/admin/auditoria">
        <i class="bi bi-clock-history me-2"></i>
        Auditoría
      </button>

      <!-- SOLICITUDES -->
      <button
        class="btn-solicitud"
        routerLink="/admin/solicitud-permisos">
        <i class="bi bi-file-earmark-text-fill"></i>
        <span>Solicitudes</span>
      </button>

      <!-- USUARIOS -->
      <button
        class="btn-usuarios"
        routerLink="/admin/usuarios">
        <i class="bi bi-people-fill me-2"></i>
        Usuarios
      </button>

      <!-- DESVINCULADOS -->
      <button
        class="btn-desvinculados"
        routerLink="/admin/funcionarios-desvinculados">
        <i class="bi bi-person-dash-fill me-2"></i>
        Desvinculados
      </button>

      <!-- LOGOUT -->
      <button
        class="btn-logout"
        (click)="authService.logout()">
      
        <i class="bi bi-box-arrow-right me-2"></i>
        cerrar sesiòn
      </button>

    </div>

  </header>

  <!-- CARD PRINCIPAL -->
  <div class="main-card">

    <div class="card-header-custom">
      <h2 class="card-title">
        MATRIZ INTEGRAL DE PERSONAL
      </h2>

      <span class="badge-mode" *ngIf="authService.isAdmin()">
        Modo Administrador
      </span>
    </div>

    <div class="card-body-custom">
      <app-tabla-empleados></app-tabla-empleados>
    </div>

  </div>

</div>
